<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="./css/peliculas.css">

    <title>Películas</title>
</head>
<body>

<nav class="navbar bg-body-tertiary">
    <div class="container-fluid">
        <form class="d-flex" role="search" onsubmit="buscar(); return false;">
            <input class="form-control me-2" type="number" placeholder="Buscar por ID" aria-label="Search" id="input-id" min="1"/>
            <button class="btn btn-outline-success" type="submit">Buscar</button>
        </form>
    </div>
</nav>

<div id="table" class="container mt-4" style="display:none;">
    <table class="table">
        <thead class="table-light">
        <tr>
            <th>Campo</th>
            <th>Valor</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>ID</td>
            <td id="parameterValue0"></td>
        </tr>
        <tr>
            <td>Título</td>
            <td id="parameterValue1"></td>
        </tr>
        <tr>
            <td>Director</td>
            <td id="parameterValue2"></td>
        </tr>
        </tbody>
    </table>
</div>

<script src="./js/pelicula.js"></script>
</body>
</html>
