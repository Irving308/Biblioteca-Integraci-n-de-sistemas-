spring.application.name=alumnos

spring.datasource.url=jdbc:mysql://localhost:3306/biblioteca_uam?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ✅ Muestra el error completo en Postman
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always